<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>WearClothing – Wardrobe</title>
  <meta name="description" content="Dein Kleiderschrank – Teile importieren, freistellen, an dir selbst als Model-Foto sehen und Looks stylen.">
  <meta name="theme-color" content="#f4f0e8" id="theme-color-meta">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="WearClothing">
  <link rel="stylesheet" href="css/styles.css">
  <script>
    // Theme früh setzen, damit kein Aufblitzen entsteht
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem('wearclothing.settings') || '{}');
        var theme = s.theme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = theme;
      } catch (e) { document.documentElement.dataset.theme = 'light'; }
    })();
  </script>
  <script src="js/lock.js"></script>
</head>
<body>
  <div class="app-shell" id="app-shell">
    <main class="gallery-pane">
      <header class="gallery-header">
        <div class="gallery-meta-row">
          <p class="piece-count" id="piece-count">0</p>
          <div class="header-tools">
            <button type="button" class="header-tool" id="nav-wardrobe" data-i18n="nav.wardrobe">Kleiderschrank</button>
            <button type="button" class="header-tool" id="nav-looks" data-i18n="nav.looks">Looks</button>
            <button type="button" class="header-tool icon-only" id="toggle-lang" data-i18n-aria="lang.toggle">DE</button>
            <button type="button" class="header-tool icon-only" id="toggle-theme" data-i18n-aria="theme.toggle"></button>
            <button type="button" class="header-tool icon-only" id="nav-settings" data-i18n-aria="settings.aria"></button>
          </div>
        </div>
        <nav class="category-nav" id="category-nav" aria-label="Kategorie"></nav>
      </header>

      <p class="status error hidden" id="status-error"></p>
      <p class="status empty hidden" id="status-empty" data-i18n="empty.wardrobe"></p>

      <section class="gallery-grid" id="gallery-grid" aria-label="Wardrobe"></section>

      <section class="looks-pane hidden" id="looks-pane">
        <div class="looks-suggestions">
          <h2 data-i18n="looks.suggestTitle">Outfit-Vorschläge</h2>
          <p class="looks-hint" data-i18n="looks.suggestHint"></p>
          <div class="suggest-grid" id="suggest-grid"></div>
          <p class="looks-hint hidden" id="suggest-empty" data-i18n="looks.suggestEmpty"></p>
        </div>
        <div class="looks-composer">
          <h2 data-i18n="looks.newTitle">Neuer Look</h2>
          <p class="looks-hint" data-i18n="looks.hint"></p>
          <div class="look-picker" id="look-picker"></div>
          <p class="looks-hint hidden" id="look-picker-empty" data-i18n="looks.pickerEmpty"></p>
          <label class="look-note"><input type="text" id="look-note" data-i18n-ph="looks.notePh"></label>
          <p class="advice-note hidden" id="look-advice"></p>
          <div class="viewer-actions">
            <button type="button" class="secondary-button" id="btn-look-advise" data-i18n="looks.advise">Stil-Check</button>
            <span class="action-spacer"></span>
            <button type="button" class="primary-button" id="btn-look-generate" data-i18n="looks.generate">Look generieren</button>
          </div>
          <div class="look-result hidden" id="look-result">
            <img alt="Look">
            <div class="viewer-actions" style="padding: 10px 12px">
              <input type="text" id="look-name" data-i18n-ph="looks.namePh" style="flex:1; min-width:0; border:1px solid var(--line); padding:8px 10px; background:var(--input-bg); color:var(--ink); font:inherit; font-size:13px">
              <button type="button" class="primary-button" id="btn-look-save" data-i18n="btn.save">Speichern</button>
            </div>
          </div>
        </div>
        <div class="looks-saved">
          <h2 data-i18n="looks.saved">Gespeicherte Looks</h2>
          <p class="looks-hint hidden" id="looks-empty" data-i18n="looks.empty" style="margin-top:14px"></p>
          <div class="looks-grid" id="looks-grid"></div>
        </div>
      </section>
    </main>

    <input type="file" id="import-input" accept="image/*" multiple hidden>
    <input type="file" id="import-input-auto" accept="image/*" multiple hidden>
    <div class="import-drop-overlay" id="drop-overlay" data-active="false" aria-hidden="true">
      <div class="import-drop-target is-over">
        <span id="drop-icon"></span>
        <h2 data-i18n="drop.title">Kleidungsfotos ablegen</h2>
        <p data-i18n="drop.sub"></p>
      </div>
    </div>

    <aside class="import-tray" id="import-tray" aria-label="Import">
      <button class="import-tray__button" type="button" id="tray-button" data-i18n-aria="tray.add"></button>
      <div class="import-tray__actions">
        <img class="import-tray__preview hidden" id="tray-preview" alt="">
        <span class="import-tray__label" id="tray-label"></span>
        <button class="import-icon-button" type="button" id="tray-upload" data-i18n-aria="tray.upload"></button>
        <button class="import-icon-button" type="button" id="tray-auto" data-i18n-aria="tray.auto"></button>
      </div>
    </aside>

    <div class="import-popover-backdrop" id="import-backdrop" data-open="false">
      <section class="import-popover" role="dialog" aria-modal="true">
        <header class="import-popover__header">
          <div>
            <p class="import-popover__eyebrow" data-i18n="import.eyebrow">Kleiderschrank-Import</p>
            <h2 class="import-popover__title" id="import-title"></h2>
          </div>
          <button class="import-icon-button" type="button" id="import-close" data-i18n-aria="import.close"></button>
        </header>
        <div id="import-body"></div>
        <div class="import-link-row">
          <input type="url" id="import-link" data-i18n-ph="import.link.ph" inputmode="url" autocomplete="off" style="padding:11px 12px;color:var(--import-ink);background:transparent;border:1px solid var(--import-line);border-radius:10px;font:inherit;font-size:13px">
          <button class="import-button" type="button" id="import-link-add" data-i18n="import.link.add">Link importieren</button>
        </div>
        <p class="import-status is-loading hidden" id="import-link-status" role="status"></p>
        <p class="import-status is-error hidden" id="import-error" role="alert"></p>
      </section>
    </div>

    <div class="import-popover-backdrop" id="settings-backdrop" data-open="false">
      <section class="import-popover" role="dialog" aria-modal="true">
        <header class="import-popover__header">
          <div>
            <p class="import-popover__eyebrow">WearClothing</p>
            <h2 class="import-popover__title" data-i18n="settings.title">Einstellungen</h2>
          </div>
          <button class="import-icon-button" type="button" id="settings-close" data-i18n-aria="settings.close"></button>
        </header>
        <div class="settings-fields">
          <p class="settings-section" data-i18n="settings.backupSection">Datensicherung</p>
          <p class="settings-note" data-i18n="settings.backupNote"></p>
          <p class="settings-note backup-warning" data-i18n="backup.keyWarning"></p>
          <div class="import-actions backup-actions">
            <button type="button" class="import-button" id="backup-export"><span id="backup-export-icon"></span> <span data-i18n="settings.backupExport">Sicherung exportieren</span></button>
            <button type="button" class="import-button" id="backup-import"><span id="backup-import-icon"></span> <span data-i18n="settings.backupImport">Sicherung importieren</span></button>
            <input type="file" id="backup-import-input" accept="application/json,.json" hidden>
          </div>

          <p class="settings-section" data-i18n="settings.appSection">Darstellung</p>
          <div class="import-field">
            <label data-i18n="settings.language">Sprache</label>
            <select id="set-language"><option value="de">Deutsch</option><option value="en">English</option></select>
          </div>
          <div class="import-field">
            <label data-i18n="settings.theme">Design</label>
            <select id="set-theme"><option value="light" data-i18n="settings.themeLight">Hell</option><option value="dark" data-i18n="settings.themeDark">Dunkel</option></select>
          </div>

          <p class="settings-section" data-i18n="settings.usageSection">OpenAI-Nutzungslimit</p>
          <div class="import-field">
            <label for="set-usage" data-i18n="settings.usageLimit">Max. KI-Bilder pro Tag</label>
            <input type="number" id="set-usage" min="0" max="999" step="1" value="40">
          </div>
          <p class="settings-note" id="usage-today"></p>
          <p class="settings-note" data-i18n="settings.usageNote"></p>

          <p class="settings-section" data-i18n="settings.openaiSection">OpenAI</p>
          <div class="import-field">
            <label for="set-openai" data-i18n="settings.openaiKey">OpenAI-API-Schlüssel</label>
            <input type="password" id="set-openai" placeholder="sk-…" autocomplete="off">
          </div>
          <p class="settings-note" data-i18n="settings.openaiNote"></p>
          <div class="import-field">
            <label for="set-image-model" data-i18n="settings.imageModel">Bildmodell</label>
            <input type="text" id="set-image-model" placeholder="gpt-image-2">
          </div>
          <div class="import-field">
            <label for="set-vision-model" data-i18n="settings.visionModel">Analysemodell</label>
            <input type="text" id="set-vision-model" placeholder="gpt-5.4-mini">
          </div>

          <p class="settings-section" data-i18n="settings.refSection">Referenzfoto</p>
          <div class="settings-photo-row">
            <img id="set-photo-preview" class="hidden" alt="">
            <button type="button" class="import-button" id="set-photo-button" data-i18n="settings.refChoose">Ganzkörperfoto wählen</button>
            <input type="file" id="set-photo" accept="image/*" hidden>
          </div>
          <p class="settings-note" data-i18n="settings.refNote"></p>

          <p class="settings-section" data-i18n="settings.linkSection">Shop-Link-Import</p>
          <div class="import-field">
            <label for="set-gemini" data-i18n="settings.geminiKey">Google-Gemini-Schlüssel</label>
            <input type="password" id="set-gemini" placeholder="AIza…" autocomplete="off">
          </div>
          <p class="settings-note" data-i18n="settings.geminiNote"></p>

          <p class="settings-section" data-i18n="settings.rulesSection">Stilregeln</p>
          <label class="settings-check"><input type="checkbox" id="r-max3" checked> <span data-i18n="rule.max3"></span></label>
          <label class="settings-check"><input type="checkbox" id="r-mono"> <span data-i18n="rule.mono"></span></label>
          <label class="settings-check"><input type="checkbox" id="r-neutral"> <span data-i18n="rule.neutral"></span></label>
          <label class="settings-check"><input type="checkbox" id="r-accent" checked> <span data-i18n="rule.accent"></span></label>
          <label class="settings-check"><input type="checkbox" id="r-metal" checked> <span data-i18n="rule.metal"></span></label>
          <div class="import-field">
            <label data-i18n="settings.favColors">Lieblingsfarben</label>
            <div class="settings-colors">
              <input type="color" id="fav-c1" value="#1f2937">
              <input type="color" id="fav-c2" value="#e5e0d8">
              <input type="color" id="fav-c3" value="#7a2e2e">
            </div>
          </div>

          <div class="import-actions">
            <button type="button" class="import-button import-button--primary" id="settings-save" data-i18n="settings.save">Speichern</button>
          </div>
        </div>
      </section>
    </div>
  </div>

  <datalist id="material-options">
    <option value="Baumwolle"></option>
    <option value="Frottee/Frotteestoff"></option>
    <option value="Cord"></option>
    <option value="Denim/Jeansstoff"></option>
    <option value="Leinen"></option>
    <option value="Wolle"></option>
    <option value="Strickware"></option>
    <option value="Fleece"></option>
    <option value="Leder"></option>
    <option value="Kunstleder"></option>
    <option value="Wildleder"></option>
    <option value="Seide"></option>
    <option value="Satin"></option>
    <option value="Samt"></option>
    <option value="Chiffon"></option>
    <option value="Spitze"></option>
    <option value="Neopren"></option>
    <option value="Polyester"></option>
    <option value="Netzstoff/Mesh"></option>
    <option value="Filz"></option>
  </datalist>
  <datalist id="pattern-options">
    <option value="Uni/Einfarbig"></option>
    <option value="Gestreift"></option>
    <option value="Kariert"></option>
    <option value="Geblümt"></option>
    <option value="Gepunktet"></option>
    <option value="Animal Print"></option>
    <option value="Camouflage"></option>
    <option value="Paisley"></option>
    <option value="Colorblock"></option>
    <option value="Aufdruck/Print"></option>
    <option value="Ombré"></option>
  </datalist>

  <script type="module" src="js/app.js"></script>
</body>
</html>
