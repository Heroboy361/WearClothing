name: Publish to GitHub Pages

# Veröffentlicht den Stand von main auf den gh-pages-Branch,
# von dem GitHub Pages die App ausliefert.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Auf gh-pages veröffentlichen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          touch .nojekyll
          git add .nojekyll
          git commit -m "Publish to GitHub Pages" || true
          git push -f origin gh-pages
